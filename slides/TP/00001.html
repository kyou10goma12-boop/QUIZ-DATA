<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英単語クイズ</title>
  <style>
    body { font-size: 2rem; text-align: center; padding: 40px; }
    #answer { display: none; margin-top: 40px; color: #d00; }
  </style>
</head>
<body>

  <div id="question">ABSENCE</div>

  <div id="answer">欠席</div>

  <script>
    // ① 表示タイミング（秒）
    const showAnswerTime = 2000;   // 2秒後に答え表示
    const nextSlideTime  = 4000;   // 4秒後に次の問題へ

    // ② 次のファイル名（Excelで自動生成しやすい）
    const nextFile = "TP-000002.html";

    // ③ 答えを表示
    setTimeout(() => {
      document.getElementById('answer').style.display = 'block';
    }, showAnswerTime);

    // ④ 次の問題へ自動遷移
    setTimeout(() => {
      window.location.href = nextFile;
    }, nextSlideTime);
  </script>

</body>
</html>
