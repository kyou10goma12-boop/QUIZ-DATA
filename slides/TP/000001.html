<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TP-000001</title>
<style>
  body { font-size: 2rem; padding: 20px; }
  #answer { display: none; margin-top: 20px; }
  button { font-size: 1.5rem; margin: 10px; padding: 10px 20px; }
  input[type=number] { font-size: 1.2rem; width: 80px; }
</style>
</head>
<body>

<!-- ★ 問題と答え -->
<div id="question">absence</div>
<div id="answer">欠席</div>

<!-- ★ 操作用ボタン -->
<div>
  <button id="showAnswerBtn">答えを表示</button>
  <button id="prevBtn">前の問題</button>
  <button id="nextBtn">次の問題</button>
  <button id="pauseBtn">一時停止</button>
</div>

<!-- ★ 時間設定（スライド側で変更可能） -->
<div style="margin-top:20px;">
  問題表示時間：
  <input type="number" id="qTimeBox" value="2" min="0.5" step="0.5"> 秒<br>

  答え表示時間：
  <input type="number" id="aTimeBox" value="2" min="0.5" step="0.5"> 秒<br>

  <button id="applyTime">時間設定を反映（次の問題から）</button>
</div>

<script>
/* ================================
   設定読み込み
================================ */
const playlist = JSON.parse(localStorage.getItem("playlist"));
const reverse  = localStorage.getItem("reverse") === "1";
const speakOn  = localStorage.getItem("speak") === "1";
const typeOn   = localStorage.getItem("typewriter") === "1";

let qTime = Number(localStorage.getItem("qTime") || 2) * 1000;
let aTime = Number(localStorage.getItem("aTime") || 2) * 1000;

document.getElementById("qTimeBox").value = qTime / 1000;
document.getElementById("aTimeBox").value = aTime / 1000;

/* ================================
   現在のスライド位置
================================ */
const current = window.location.pathname.split("/").pop();
const index = playlist.findIndex(p => p.endsWith(current));

/* ================================
   読み上げ
================================ */
function speak(text) {
  if (!speakOn) return;
  const uttr = new SpeechSynthesisUtterance(text);
  uttr.lang = "en-US";
  speechSynthesis.speak(uttr);
}

/* ================================
   タイプライター
================================ */
function typeWriter(element, text, speed = 100) {
  if (!typeOn) {
    element.textContent = text;
    return;
  }
  element.textContent = "";
  let i = 0;
  const timer = setInterval(() => {
    element.textContent += text[i];
    i++;
    if (i >= text.length) clearInterval(timer);
  }, speed);
}

/* ================================
   表裏切り替え
================================ */
const question = document.getElementById("question");
const answer   = document.getElementById("answer");

if (reverse) {
  // 答え → 問題
  answer.style.display = 'block';
  question.style.display = 'none';

  typeWriter(answer, answer.textContent);
  speak(answer.textContent);

  setTimeout(() => {
    question.style.display = 'block';
    typeWriter(question, question.textContent);
    speak(question.textContent);
  }, qTime);

} else {
  // 問題 → 答え
  answer.style.display = 'none';

  typeWriter(question, question.textContent);
  speak(question.textContent);

  setTimeout(() => {
    answer.style.display = 'block';
    typeWriter(answer, answer.textContent);
  }, qTime);
}

/* ================================
   自動で次へ（停止可能）
================================ */
let paused = false;

setTimeout(() => {
  if (!paused) {
    const next = playlist[index + 1];
    if (next) window.location.href = next;
  }
}, qTime + aTime);

/* ================================
   ボタン操作
================================ */
document.getElementById("showAnswerBtn").onclick = () => {
  answer.style.display = "block";
};

document.getElementById("nextBtn").onclick = () => {
  const next = playlist[index + 1];
  if (next) window.location.href = next;
};

document.getElementById("prevBtn").onclick = () => {
  const prev = playlist[index - 1];
  if (prev) window.location.href = prev;
};

document.getElementById("pauseBtn").onclick = () => {
  paused = !paused;
  document.getElementById("pauseBtn").textContent = paused ? "再開" : "一時停止";
};

/* ================================
   時間設定を変更（次の問題から反映）
================================ */
document.getElementById("applyTime").onclick = () => {
  const q = Number(document.getElementById("qTimeBox").value);
  const a = Number(document.getElementById("aTimeBox").value);

  localStorage.setItem("qTime", q);
  localStorage.setItem("aTime", a);

  alert("次の問題から時間設定が反映されます");
};
</script>

</body>
</html>
